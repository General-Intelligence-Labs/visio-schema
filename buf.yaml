version: v2
modules:
  - path: proto
  - path: third_party/foxglove-sdk/schemas/proto
    lint:
      use: []
    breaking:
      use: []
lint:
  use:
    - STANDARD
  except:
    # We use version-first proto packages like `visio_schema.v1.sensor`,
    # `visio_schema.v1.ros.geometry_msgs`, etc. The standard rule wants the *file*
    # path to mirror the package (which our layout does: proto/visio_schema/v1/...),
    # but it also wants one file per leaf dir; we put multiple .protos under a
    # single group dir for related types, the common convention in larger schemas.
    # Skip the strict check.
    - PACKAGE_DIRECTORY_MATCH
    # Our packages put the version first (`visio_schema.v1.sensor`), not as the
    # trailing component the rule expects (`...sensor.v1`); foxglove's package is
    # just `foxglove`. Neither matches the version-suffix convention — skip it.
    - PACKAGE_VERSION_SUFFIX
    # Our enum values are scope-prefixed by the enum's logical category
    # (DEVICE_*, STREAM_*, MAGNET_*) rather than the exact enum name
    # (DEVICE_CLASS_*, STREAM_KIND_*, MAGNET_STATUS_*). The Google style
    # rule would balloon every value with an extra prefix; the scoped
    # form is already collision-safe across our enums.
    - ENUM_VALUE_PREFIX
    - ENUM_ZERO_VALUE_SUFFIX
breaking:
  use:
    - FILE
