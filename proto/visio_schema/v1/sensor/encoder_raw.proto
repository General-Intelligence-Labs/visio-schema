// visio/sensor/v1/encoder_raw.proto
//
// Bundled raw magnetic-encoder samples (raw count, magnitude, AGC,
// magnet detection) from a single encoder instance. Published on
// STREAM_ENCODER_RAW with the wire Header's `stream_index` identifying
// which encoder.
//
// Why bundled (and why raw is separate from calibrated):
//   - Calibrated joint position (the [0, 1] normalized open/close value
//     a gripper-control or training pipeline actually uses) lives on
//     STREAM_JOINT_STATES as foxglove.JointStates, so Foxglove Studio
//     can render a URDF-driven gripper animation natively.
//   - This stream carries the raw sensor readouts that are useful for
//     bring-up, calibration, and field debugging: raw count, AS5600
//     magnetic-field magnitude, AGC, magnet-detection status. Foxglove
//     can't render these as anything specific, so we optimize for
//     wire efficiency by bundling.
//
// Same bundle-period convention as ImuRaw: producer-side knob, 33 ms
// for low-latency, 1 s for long-term storage. Per-sample t_offset_ns
// preserves the producer's true sample sequence.
//
// No frame_id here: each encoder's reference frame is implicit per
// (DeviceClass, stream_index) on the wire Header.
//
// Parity note: this is the diagnostic side of UMI v3's
// T_POSITION_ENCODER (F_POSITION_ENCODER_ANGLE_RAW / _MAGNITUDE /
// _AGC / _MAGNET fields). The cooked _ANGLE_DEG and _NORMALIZED
// fields move to foxglove.JointStates.

syntax = "proto3";

package visio_schema.v1.sensor;

import "google/protobuf/timestamp.proto";

// A single raw encoder sample.
message EncoderRawSample {
  // Time offset in nanoseconds from EncoderRaw.first_sample_time,
  // captured AT the moment of sensor read.
  uint64 t_offset_ns = 1;

  // Raw sensor angle reading. For 12-bit encoders like AS5600 this
  // is a value in [0, 4095]. Trivially convertible to degrees as
  // (angle_raw / max_count) * 360 by the consumer if needed; we do
  // not pre-compute that here.
  uint32 angle_raw = 2;

  // Magnetic field strength reported by the sensor, in sensor units
  // (AS5600 reports a 12-bit value).
  uint32 magnitude = 3;

  // Automatic gain control reading.
  uint32 agc = 4;

  // Magnet detection status.
  enum MagnetStatus {
    MAGNET_UNKNOWN = 0;
    MAGNET_OK      = 1;
    MAGNET_WEAK    = 2;
    MAGNET_STRONG  = 3;
    MAGNET_MISSING = 4;
  }
  MagnetStatus magnet_status = 5;
}

// Bundle of consecutive raw encoder samples from a single encoder
// instance. Empty bundles MUST NOT be emitted (use STREAM_HEARTBEAT
// for liveness).
message EncoderRaw {
  // Time of the first sample in this bundle, in the producer's local
  // clock domain. The wire Header carries the same timestamp.
  google.protobuf.Timestamp first_sample_time = 1;

  // Raw samples in strict acquisition order (t_offset_ns monotonically
  // non-decreasing).
  repeated EncoderRawSample samples = 2;
}
