// visio_schema/v1/service/device_info/device_info.proto
//
// Discovery service on the CONTROL_STREAM_DEVICE_INFO control stream.
//
// Each device periodically broadcasts the channels it produces (default 1 Hz;
// also immediately on link-up and on channel-set change). A hub remaps each
// child's channel ids into its own unified id space and re-broadcasts a merged
// DeviceInfo upward. There is no request/response — discovery is a pure
// periodic push, matching the Foxglove "advertise your channels" convention.
//
// `Channel` mirrors a Foxglove channel field-for-field (ws-protocol / MCAP) so
// bridging to a Foxglove server or an MCAP file is a pure field copy. Each
// channel carries its schema inline (a serialized FileDescriptorSet), so a
// DeviceInfo is self-describing: a fresh listener bootstraps from any single
// announcement with no compiled-in schema registry.
//
// Calibration is NOT special-cased here. Devices declare calibration outputs
// as ordinary channels (e.g. foxglove.CameraCalibration,
// visio_schema.v1.calibration.ImuCalibration) alongside sensor channels; the
// recorder writes them as regular MCAP Message records.

syntax = "proto3";

package visio_schema.v1.service.device_info;

// One stream a device produces, described exactly as a Foxglove channel.
message Channel {
  // Per-link numeric label for this channel. Assigned by the producing
  // device (from CONTROL_STREAM_FIRST_DYNAMIC up); rewritten into a unified id
  // by each hub as it relays. The wire Header's `stream_id` carries this value.
  uint32 id = 1;

  // Fully-qualified topic, e.g. "/glove_left/imus/3/raw". Shape convention:
  // /<device>/<sensor-group>/<index>/<sub-field>. This is the stream's stable
  // global identity; `id` is only a per-link compression label.
  string topic = 2;

  // Message encoding of the payloads on this channel, e.g. "protobuf".
  string encoding = 3;

  // Fully-qualified protobuf type name of the payload,
  // e.g. "visio_schema.v1.sensor.ImuRaw".
  string schema_name = 4;

  // Serialized google.protobuf.FileDescriptorSet (payload type + transitive
  // deps) — exactly the bytes an MCAP Schema record's `data` field expects and
  // a Foxglove ws-protocol channel's `schema` carries.
  bytes schema = 5;

  // Encoding of `schema`, e.g. "protobuf".
  string schema_encoding = 6;
}

// A device's identity + the channels it currently produces. Broadcast
// periodically; a hub merges its descendants' channels (with remapped ids)
// into its own announcement.
message DeviceInfo {
  // Stable, per-unit addressable label — the human-readable name shown for this
  // device and the key it is addressed by (`Command.target_device`, OTA
  // recipient). Unique per physical unit; in the Visio firmware this is the
  // `GILABS-<code8>` hostname / SoftAP SSID. NOTE: this is the *unit* identity,
  // not the role — the logical role travels in `equipment_type` (field 7), which
  // is also the leading topic segment for this device's channels.
  string device_name = 1;

  // Channels this device (and, for a hub, its descendants) produce.
  repeated Channel channels = 2;

  // Firmware / app version (free-form, typically semver "1.2.3").
  string firmware_version = 3;

  // Hardware revision string (e.g. "v3", "rev_b").
  string hardware_revision = 4;

  // Serial number, MAC, or persistent UUID (opaque to the bus). Optional.
  string serial = 5;

  // Boot wall-clock time (seconds since Unix epoch). Lets recorders convert
  // this device's monotonic ns timestamps to absolute Unix time for MCAP
  // log_time. 0 if the device has no RTC (the recorder substitutes its own
  // wall clock at session start).
  uint64 boot_unix_seconds = 6;

  // Logical role / kind of this device — e.g. "ego", "glove_left",
  // "glove_right", "gripper_left", "gripper_right". Unlike `device_name` this is
  // NOT unique (many units share a role); it is the leading topic segment for
  // this device's channels (e.g. "/glove_left/imus/3/raw"), so recordings and
  // pipelines group by it. Empty if a device does not declare a role.
  string equipment_type = 7;
}
