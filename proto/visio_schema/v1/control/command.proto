// visio/control/v1/command.proto
//
// Host-to-device control surface on the CONTROL_STREAM_COMMAND control
// stream. Visio addition; UMI v3 did not have a first-class command type
// (control flow lived in config files and out-of-band sockets).
//
// Target is addressed by device name (the DeviceInfo.device_name a device
// announces). Empty target = broadcast to every device.

syntax = "proto3";

package visio_schema.v1.control;

import "foxglove/CameraCalibration.proto";
import "foxglove/FrameTransform.proto";
import "visio_schema/v1/calibration/imu.proto";
import "visio_schema/v1/calibration/encoder.proto";

message Command {
  // Intended recipient, by device name. A receiving peer MUST ignore
  // Commands whose target_device is neither empty (broadcast) nor its own
  // device name.
  string target_device = 1;

  // Per-sender monotonic counter; useful for matching to acks if a
  // future ack mechanism is added.
  uint64 command_id = 2;

  oneof body {
    StartRecording start_recording = 10;
    StopRecording  stop_recording  = 11;
    Identify       identify        = 12;
    SetAutoStart   set_auto_start  = 13;
    ConnectWifi    connect_wifi    = 14;
    ScanWifi       scan_wifi       = 15;
    SetStorage     set_storage     = 16;
    TestStorage    test_storage    = 17;
    ListRecordings list_recordings = 18;
    GetState       get_state       = 19;
    SetCalibration set_calibration = 20;
  }
}

// Begin a recording session on the target.
message StartRecording {
  // Optional session name. If empty, the target picks one.
  string session_name = 1;
}

// End the current recording session on the target.
message StopRecording {
}

// Ask the target to publish its DeviceInfo immediately, out of the
// normal cadence. Replaces UMI v3's T_DEVICE_INFO_REQ query.
message Identify {
}

// ── Provisioning / control surface folded from the old HTTP setup API ───────
// Each of these is answered by a CommandResult on the target's
// /<device>/command_result channel (see command_result.proto), correlated by
// Command.command_id. SECURITY: ConnectWifi.passphrase and SetStorage secret
// keys traverse the (unauthenticated) bus — acceptable on USB, but widens
// exposure on the TCP leg; bus auth is tracked separately.

// Set the auto-start-at-boot recording policy (persisted; next-boot effect,
// does not toggle the current session). Replaces POST /recording/auto_start.
message SetAutoStart {
  bool auto_start = 1;
}

// Provision Wi-Fi STA credentials and (re)associate. Replaces POST /wifi.
message ConnectWifi {
  string ssid       = 1;
  string passphrase = 2;
}

// Trigger a Wi-Fi scan; the CommandResult carries WifiScanResults. Replaces
// GET /wifi/scan.
message ScanWifi {
}

// Persist S3 storage credentials. Replaces POST /storage.
message SetStorage {
  string endpoint_url      = 1;
  string region            = 2;
  string bucket            = 3;
  string access_key_id     = 4;
  string secret_access_key = 5;
  string prefix            = 6;
}

// Validate S3 credentials WITHOUT persisting (HEAD bucket). Replaces
// POST /storage/test. Same fields as SetStorage.
message TestStorage {
  string endpoint_url      = 1;
  string region            = 2;
  string bucket            = 3;
  string access_key_id     = 4;
  string secret_access_key = 5;
  string prefix            = 6;
}

// List recorded sessions + their upload state; the CommandResult carries
// RecordingsList. Replaces GET /recordings.
message ListRecordings {
  // Max entries to return (newest first). 0 = a device-chosen default.
  uint32 limit = 1;
}

// Pull the device's operational-state snapshot; the CommandResult carries
// DeviceState. Replaces GET /info.
message GetState {
}

// Persist one piece of sensor calibration (effective on next boot). The target
// device is the enclosing Command.target_device (end-to-end, hub-forwarded), so
// a host can address a specific relayed leaf by name. The artifact is routed by
// (sensor_kind, sensor_index, which_artifact) to the matching topic + store:
//   intrinsics  -> /<dev>/camera/<i>/intrinsics  (foxglove.CameraCalibration)
//   extrinsics  -> /<dev>/camera/<i>/extrinsics or /<dev>/imu/<i>/extrinsics
//                  (foxglove.FrameTransform, child posed in the cam0 frame)
//   imu_info    -> /<dev>/imu/<i>/info           (ImuCalibration)
//   encoder_info-> /<dev>/encoder/<i>/info       (EncoderCalibration)
// Answered by a CommandResult (ok + DeviceState), correlated by command_id.
message SetCalibration {
  enum SensorKind {
    SENSOR_KIND_UNSPECIFIED = 0;
    CAMERA = 1;
    IMU = 2;
    ENCODER = 3;
  }
  SensorKind sensor_kind = 1;   // which sensor family the artifact targets
  uint32     sensor_index = 2;  // 0-based instance within that family

  oneof artifact {
    foxglove.CameraCalibration intrinsics = 11;  // CAMERA
    foxglove.FrameTransform    extrinsics = 12;  // CAMERA (i>0) or IMU, rel. cam0
    visio_schema.v1.calibration.ImuCalibration imu_info = 13;  // IMU
    visio_schema.v1.calibration.EncoderCalibration encoder_info = 14;  // ENCODER
    // 10 reserved for a deferred magnetometer artifact.
  }
}
