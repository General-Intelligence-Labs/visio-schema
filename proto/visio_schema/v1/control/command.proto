// visio/control/v1/command.proto
//
// Host-to-device control surface on the CONTROL_STREAM_COMMAND control
// stream. Visio addition; UMI v3 did not have a first-class command type
// (control flow lived in config files and out-of-band sockets).
//
// Target is addressed by device name (the DeviceInfo.device_name a device
// announces). Empty target = broadcast to every device.

syntax = "proto3";

package visio_schema.v1.control;

import "foxglove/CameraCalibration.proto";
import "foxglove/FrameTransform.proto";
import "visio_schema/v1/calibration/imu.proto";
import "visio_schema/v1/calibration/encoder.proto";
import "visio_schema/v1/calibration/camera_tuning.proto";

message Command {
  // Intended recipient, by device name. A receiving peer MUST ignore
  // Commands whose target_device is neither empty (broadcast) nor its own
  // device name.
  string target_device = 1;

  // Per-sender monotonic counter; useful for matching to acks if a
  // future ack mechanism is added.
  uint64 command_id = 2;

  oneof body {
    StartRecording start_recording = 10;
    StopRecording  stop_recording  = 11;
    Identify       identify        = 12;
    SetAutoStart   set_auto_start  = 13;
    ConnectWifi    connect_wifi    = 14;
    ScanWifi       scan_wifi       = 15;
    SetStorage     set_storage     = 16;
    TestStorage    test_storage    = 17;
    ListRecordings list_recordings = 18;
    GetState       get_state       = 19;
    SetCalibration set_calibration = 20;
    SetTime        set_time        = 21;
    SetRecordingMeta set_recording_meta = 22;
    SetVideoStreaming set_video_streaming = 23;
    SetBitrate     set_bitrate     = 24;
    FormatStorage  format_storage  = 25;
    SetAutoUpload  set_auto_upload = 26;
    SetNoticeLang  set_notice_lang = 27;
    SetResolution  set_resolution  = 28;
    ResetToAp      reset_to_ap     = 29;
  }
}

// Begin a recording session on the target.
message StartRecording {
  // Optional session name. If empty, the target picks one.
  string session_name = 1;

  // ── capture metadata (host-supplied; persisted into the session's
  // session.json sidecar). All optional; empty/zero means "unknown".
  string task          = 2;  // free-text capture task / label
  string location      = 3;  // human-readable place (user-entered)
  double latitude      = 4;  // GPS; 0 when unknown
  double longitude     = 5;  // GPS; 0 when unknown
  int64  client_unix_us = 6; // host capture timestamp (us since Unix epoch, UTC)
  sint32 client_utc_offset_min = 7;  // minutes east of UTC (+480 = UTC+8); for
                                     // on-device local time = utc + offset
  uint32 fps           = 8;  // capture frame rate; 0 = use the device's config
}

// End the current recording session on the target.
message StopRecording {
}

// Ask the target to publish its DeviceInfo immediately, out of the
// normal cadence. Replaces UMI v3's T_DEVICE_INFO_REQ query.
message Identify {
}

// Pause/resume camera video streaming to THIS bus client only (addressed by the
// connection the Command arrives on — not a device-wide switch). Recording to
// disk and any other connected client are unaffected. The app pauses streaming
// on screens that don't render video (e.g. the recordings list) so a control
// reply (ListRecordings, etc.) isn't stuck behind buffered H.265 on a slow
// Wi-Fi AP. A fresh connection always starts streaming (paused state is not
// persisted), so a reconnect auto-resumes.
message SetVideoStreaming {
  bool enabled = 1;  // true = stream video to me; false = pause it
}

// ── Provisioning / control surface folded from the old HTTP setup API ───────
// Each of these is answered by a CommandResult on the target's
// /<device>/command_result channel (see command_result.proto), correlated by
// Command.command_id. SECURITY: ConnectWifi.passphrase and SetStorage secret
// keys traverse the (unauthenticated) bus — acceptable on USB, but widens
// exposure on the TCP leg; bus auth is tracked separately.

// Set the auto-start-at-boot recording policy (persisted; next-boot effect,
// does not toggle the current session). Replaces POST /recording/auto_start.
message SetAutoStart {
  bool auto_start = 1;
}

// Enable/disable automatic S3 upload of finished recordings. Persisted to a
// device-side sidecar (/userdata/.../auto_upload.json) and applied without a
// reboot: while disabled the uploader starts no new uploads and stays idle (an
// in-flight upload finishes; the stored creds + queue are NOT cleared), so
// re-enabling resumes. Default is enabled. The current value is reported in
// DeviceState.auto_upload_enabled.
message SetAutoUpload {
  bool enabled = 1;
}

// Persist the camera H.265 target bitrate to a device-side sidecar
// (/root/umi_embedded.bitrate.json), applied to EVERY camera. Like
// SetAutoStart, this is persisted but takes effect on the NEXT BOOT only — the
// running encoder is not retuned live — so the app should tell the user to
// reboot the device for the new bitrate to apply. The current persisted value
// is echoed back in DeviceState.video_bitrate_kbps.
message SetBitrate {
  uint32 bitrate_kbps = 1;  // target CBR bitrate (kbit/s) for all cameras
}

// Persist the camera capture resolution to a device-side sidecar
// (resolution.json under the device state dir, a flat sibling of
// bitrate.json), applied to EVERY camera. Like SetBitrate, this is persisted
// but takes effect on the NEXT BOOT only — the running ISP/encoder pipeline is
// not reconfigured live — so the app should tell the user to reboot the device
// for the new resolution to apply. The sensor driver must support the
// requested geometry (e.g. SC3336: 1920x1080, 1600x1296, 1600x1200); an
// unsupported size is snapped to the sensor's default mode at boot. The
// current persisted value is echoed back in DeviceState.video_width/height.
message SetResolution {
  uint32 width  = 1;  // capture width in pixels, for all cameras
  uint32 height = 2;  // capture height in pixels, for all cameras
}

// Persist default recording metadata to a device-side sidecar
// (/root/umi_embedded/recording_meta.json). Applied to EVERY new session until
// changed — including auto-started boot recordings, which carry no app input.
// Persisted; takes effect on the next recording or reboot (does NOT retag the
// in-progress session). An explicit StartRecording.{task,location} overrides
// these defaults for that one session. Answered by a CommandResult (ok +
// DeviceState echoing the persisted values).
message SetRecordingMeta {
  string task     = 1;  // free-text capture task / label
  string location = 2;  // human-readable place (user-entered)
  string message  = 3;  // free-text note / annotation
  string capturer = 8;  // who operated the capture (user-entered)
  // GPS + host time/zone, mirroring StartRecording — persisted so auto-started
  // boot recordings (no app input) still carry them. All optional; 0 = unknown.
  // Unlike the text fields (where empty CLEARS the stored value), a 0 fix
  // KEEPS the stored coordinates — hosts without a fix send 0, and wiping the
  // last known position (also pushed via SetTime) would lose data. Coordinates
  // are machine-owned, not user-cleared.
  double latitude              = 4;  // GPS; 0 when unknown (keeps stored value)
  double longitude             = 5;  // GPS; 0 when unknown (keeps stored value)
  int64  client_unix_us        = 6;  // host reference timestamp (us since epoch)
  sint32 client_utc_offset_min = 7;  // minutes east of UTC (+480 = UTC+8)
}

// Set the device's wall clock + UTC offset. RV1106 boards have no RTC and boot
// to 1970-01-01, so a host pushes the real time (typically right after it
// connects, before recording) so session timestamps are correct. Answered by a
// CommandResult (ok + DeviceState).
//
// The host's GPS fix rides the same push: the boards have no GNSS receiver, so
// the phone is the only source of coordinates, and clock + position are both
// "where/when is this rig right now" host references. A non-zero fix is
// persisted into the recording-metadata sidecar (the same latitude/longitude
// SetRecordingMeta carries) and stamped into every new session; 0 = no fix,
// and the device keeps its last stored coordinates.
message SetTime {
  int64  unix_us        = 1;  // wall-clock time, us since Unix epoch (UTC)
  sint32 utc_offset_min = 2;  // minutes east of UTC (+480 = UTC+8)
  double latitude       = 3;  // GPS; 0 when unknown (keeps stored value)
  double longitude      = 4;  // GPS; 0 when unknown (keeps stored value)
}

// Provision Wi-Fi STA credentials and (re)associate. Replaces POST /wifi.
message ConnectWifi {
  string ssid       = 1;
  string passphrase = 2;
}

// Trigger a Wi-Fi scan; the CommandResult carries WifiScanResults. Replaces
// GET /wifi/scan.
message ScanWifi {
}

// Forget the provisioned Wi-Fi STA credentials and return to the setup soft-AP.
//
// A one-shot ACTION, not a mode: the device erases the stored credentials (so
// it will not rejoin on the next boot), drops any STA association, and brings
// the AP back up. Sending it while already on the AP is a no-op that still
// clears the stored credentials.
//
// Like ConnectWifi, the CommandResult usually never reaches a caller that is
// talking over the STA link, because the device tears that link down to switch
// radios (the RTL8821CS is single-radio). Callers should treat a post-send
// transport drop as success and rediscover the device on its AP.
message ResetToAp {
}

// Persist S3 storage credentials. Replaces POST /storage.
message SetStorage {
  string endpoint_url      = 1;
  string region            = 2;
  string bucket            = 3;
  string access_key_id     = 4;
  string secret_access_key = 5;
  string prefix            = 6;
}

// Validate S3 credentials WITHOUT persisting (HEAD bucket). Replaces
// POST /storage/test. Same fields as SetStorage.
message TestStorage {
  string endpoint_url      = 1;
  string region            = 2;
  string bucket            = 3;
  string access_key_id     = 4;
  string secret_access_key = 5;
  string prefix            = 6;
}

// List recorded sessions + their upload state; the CommandResult carries
// RecordingsList. Replaces GET /recordings.
message ListRecordings {
  // Max entries to return (newest first). 0 = a device-chosen default.
  uint32 limit = 1;
}

// Pull the device's operational-state snapshot; the CommandResult carries
// DeviceState. Replaces GET /info.
message GetState {
}

// Reformat the recording SD card, then re-mount it. Manufacturing / quality-
// check path for a sealed unit that has no shell — the device unmounts the card,
// runs mkfs, re-mounts, and re-creates the recording dir. Any active recording
// is stopped (and finalized) first, and ALL data on the card is destroyed.
// Answered by a CommandResult (ok + DeviceState; disk_free_pct reflects the
// freshly-formatted card). The device needs the matching mkfs on its rootfs
// (ext4/exfat/vfat); an unsupported type is refused (ok=false).
message FormatStorage {
  // Target filesystem. Empty = preserve the card's current type (detected from
  // the on-disk superblock; a blank card or an unsupported filesystem falls
  // back to FAT32/vfat). Explicit "ext4" / "exfat" / "vfat" forces a type.
  string fs_type = 1;
}

// Select the language of the device's spoken voice notices (boards with a
// speaker, e.g. audio_ego_v3; speakerless boards accept and ignore it).
// Applied immediately AND persisted to a device-side sidecar
// (/root/umi_embedded.notice_lang.json). The app typically sends its phone
// locale right after connecting. An unknown/unshipped language falls back to
// the device default (English). Answered by a CommandResult (ok + DeviceState).
message SetNoticeLang {
  // Lowercase ISO 639-1 code of the primary language ("en", "zh"). Region
  // subtags are ignored by the device ("zh-CN" -> "zh").
  string lang = 1;
}

// Persist one piece of sensor calibration (effective on next boot). The target
// device is the enclosing Command.target_device (end-to-end, hub-forwarded), so
// a host can address a specific relayed leaf by name. The artifact is routed by
// (sensor_kind, sensor_index, which_artifact) to the matching topic + store:
//   intrinsics  -> /<dev>/camera/<i>/intrinsics  (foxglove.CameraCalibration)
//   extrinsics  -> /<dev>/camera/<i>/extrinsics or /<dev>/imu/<i>/extrinsics
//                  (foxglove.FrameTransform, child posed in the cam0 frame)
//   imu_info    -> /<dev>/imu/<i>/info           (ImuCalibration)
//   encoder_info-> /<dev>/encoder/<i>/info       (EncoderCalibration)
//   camera_tuning -> persisted only; NO topic    (CameraTuning)
// Answered by a CommandResult (ok + DeviceState), correlated by command_id.
//
// camera_tuning is the one artifact that is not re-published. It is a per-unit
// ISP measurement the device consumes to trim its own AWB — nothing downstream
// consumes it, so it is stored and applied but never broadcast. That also means
// the CommandResult is the ONLY acknowledgement: unlike the other artifacts,
// there is no 1 Hz re-broadcast to confirm against.
message SetCalibration {
  enum SensorKind {
    SENSOR_KIND_UNSPECIFIED = 0;
    CAMERA = 1;
    IMU = 2;
    ENCODER = 3;
  }
  SensorKind sensor_kind = 1;   // which sensor family the artifact targets
  uint32     sensor_index = 2;  // 0-based instance within that family

  oneof artifact {
    foxglove.CameraCalibration intrinsics = 11;  // CAMERA
    foxglove.FrameTransform    extrinsics = 12;  // CAMERA (i>0) or IMU, rel. cam0
    visio_schema.v1.calibration.ImuCalibration imu_info = 13;  // IMU
    visio_schema.v1.calibration.EncoderCalibration encoder_info = 14;  // ENCODER
    visio_schema.v1.calibration.CameraTuning camera_tuning = 15;  // CAMERA, set-only
    // 10 reserved for a deferred magnetometer artifact.
  }
}
