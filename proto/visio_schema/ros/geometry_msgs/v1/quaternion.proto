// visio/ros/geometry_msgs/v1/quaternion.proto
//
// Protobuf message that Foxglove panels see as ROS's
// geometry_msgs/msg/Quaternion. Carries the four canonical doubles
// (x, y, z, w) at the message root — which is what Foxglove panels
// match on — plus a producer-clock acquisition timestamp for
// self-description, consistent with every other Visio payload schema.
//
// How Foxglove sees this: when McapEndpoint writes the Schema record
// for a stream using this proto, it MUST set the Schema.name to
// "geometry_msgs/msg/Quaternion" (NOT the protobuf full name
// "visio_schema.ros.geometry_msgs.v1.Quaternion"). Foxglove panels filter
// topics by Schema.name string; matching the ROS name is what gives
// us native rendering. The encoding stays "protobuf"; Studio parses
// the bytes via the embedded FileDescriptor.
//
// Why the extra timestamp field is harmless: Foxglove panels read
// only the fields they know (`x`, `y`, `z`, `w`); unknown fields are
// silently ignored. Studio's timeline scrubber uses MCAP log_time
// regardless. Our own consumers use the inner `timestamp` for
// self-describing payloads outside the MCAP / wire context.
//
// No frame_id: each IMU's body frame is implicit per (DeviceClass,
// stream_index), and the fusion output is always expressed in a
// gravity-aligned world frame (chip NDOF for BNO055; gravity-aligned
// yaw-drifting world for host VQF).

syntax = "proto3";

package visio_schema.ros.geometry_msgs.v1;

import "google/protobuf/timestamp.proto";

message Quaternion {
  // Canonical ROS geometry_msgs/Quaternion fields, in canonical order.
  // Foxglove orientation panels read these by name from the message root.
  double x = 1;
  double y = 2;
  double z = 3;
  double w = 4;

  // Visio extension: producer-clock acquisition time. Foxglove panels
  // ignore this field; our consumers use it for self-description.
  // Wire Header's `timestamp` carries the same value at send time;
  // MCAP's log_time carries the receiver-clock equivalent on disk.
  google.protobuf.Timestamp timestamp = 5;
}
