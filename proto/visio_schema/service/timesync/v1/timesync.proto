// visio/service/timesync/v1/timesync.proto
//
// NTP-style two-way time exchange. The Timesync service rides the
// regular bus on the reserved StreamKind STREAM_TIMESYNC — it is an
// ordinary bus participant, not a transport-layer concern.
//
// Every receiving peer's local Timesync service maintains an offset
// table keyed by `visio_schema.wire.v1.DeviceClass` (the wire Header's
// `routed_from` field on each inbound message — the immediate previous
// hop, which equals `device` on direct connections), which the Bus uses
// to rewrite the wire Header's `timestamp` on every inbound message.
//
// See visio-schema/docs/timesync.md for the full algorithm, the
// sliding-window outlier filter, and the recommended exchange cadence.

syntax = "proto3";

package visio_schema.service.timesync.v1;

import "visio_schema/wire/v1/header.proto";

// Initiator -> responder. The initiator stamps `t0` from its own local
// monotonic clock immediately before handing the message to the bus
// for `publish_priority` send.
message Request {
  // Initiator's local monotonic clock at send time, nanoseconds since
  // the initiator's local epoch.
  uint64 t0 = 1;

  // Initiator's identity (the same value used in this peer's wire
  // Header `device` field).
  visio_schema.wire.v1.DeviceClass initiator = 2;

  // Per-initiator monotonic counter, used to match Response to Request
  // and to detect dropped exchanges.
  uint64 exchange_seq = 3;
}

// Responder -> initiator. The responder stamps `t1` the moment its
// Endpoint surfaces the inbound bytes, and `t2` immediately before
// handing the response to its bus for `publish_priority` send. Both
// timestamps are in the responder's local monotonic clock.
message Response {
  // Echo of Request.t0. Initiator's local monotonic clock at send.
  uint64 t0 = 1;

  // Responder's local monotonic clock at the moment the Request was
  // received from the wire. Nanoseconds since responder's epoch.
  uint64 t1 = 2;

  // Responder's local monotonic clock at the moment this Response is
  // sent. Nanoseconds since responder's epoch.
  uint64 t2 = 3;

  // Echo of Request.initiator.
  visio_schema.wire.v1.DeviceClass initiator = 4;

  // Responder's identity.
  visio_schema.wire.v1.DeviceClass responder = 5;

  // Echo of Request.exchange_seq.
  uint64 exchange_seq = 6;
}

// On the initiator side, t3 is captured locally when the Response is
// received off the wire. Offset and round-trip-time are then computed
// as:
//
//   rtt    = (t3 - t0) - (t2 - t1)
//   offset = ((t1 - t0) + (t2 - t3)) / 2
//
// The offset is the value to ADD to the responder's clock to convert
// it into the initiator's clock. Each peer's Timesync service stores
// per-peer offsets and exposes them to the Bus, which applies them on
// inbound Header `timestamp` rewrites.
