// visio_schema/wire/v1/header.proto
//
// The wire Header is a small protobuf message that precedes every
// payload on every Endpoint that needs framing (TCP, Serial, UDP).
// It carries the routing identity (who, what, sub-stream), an
// ordering counter, and a single timestamp. The payload bytes are
// laid out separately on the wire — see visio-schema/docs/framing.md
// for the per-Endpoint frame format.
//
// Design properties:
//   - All enum values in [0, 127] -> each enum field encodes to
//     exactly 2 bytes (1 tag + 1 varint value).
//   - No strings on the wire. Topic and peer-ID strings are
//     presentation-only, synthesized at the MCAP / Foxglove layer.
//   - One timestamp only. The producer's own acquisition timestamp
//     lives INSIDE the payload (every published payload type carries
//     one); we do not duplicate it in the Header.
//   - Relays supported: each hop's receiver rewrites `timestamp`
//     using the Timesync offset for `routed_from`.

syntax = "proto3";

package visio_schema.wire.v1;

import "google/protobuf/descriptor.proto";
import "google/protobuf/timestamp.proto";

// Per-enum-value annotations declaring the wire-payload protobuf type
// and the MCAP Schema.name that go with each StreamKind. Read at
// runtime by visio-mq's SchemaRegistry via the EnumValueDescriptor
// extension API in both Python and C++. The proto file is the
// canonical source of truth; docs/stream_type_map.md is a
// human-readable view of these annotations.
//
// Dual-payload service streams (STREAM_TIMESYNC, STREAM_DEVICE_INFO)
// carry one of two types per direction. They are deliberately left
// UNannotated so SchemaRegistry returns None for them; service
// implementations hand-code the two-type dispatch.
//
// Tag numbers >= 50000 are inside the user-defined option range.
extend google.protobuf.EnumValueOptions {
  // Protobuf full name of the payload that follows the Header on the
  // wire when this StreamKind is set. E.g. "visio_schema.sensor.v1.ImuRaw".
  string visio_proto_type        = 60000;

  // MCAP Schema.name to register when writing this stream to an MCAP
  // file. Usually identical to visio_proto_type; differs for the
  // ROS-mimic pattern (STREAM_IMU_QUAT registers as the ROS-canonical
  // "geometry_msgs/msg/Quaternion" so Foxglove Studio's orientation
  // panels render natively).
  string visio_mcap_schema_name  = 60001;
}

// Identifies a peer on the bus. Used for:
//   - Header `device` field      (origin, immutable across hops)
//   - Header `routed_from` field (immediate previous hop;
//                                 equals `device` on direct connections,
//                                 rewritten by each relay on forward)
//   - TimesyncService offset table key
//   - Bus constructor argument (each peer declares its own identity)
//
// Left/right and similar instance distinctions are SEPARATE enum
// values, not a separate `device_index` field. This keeps peer
// identity a compile-time constant per build target.
//
// Range conventions:
//   0           DEVICE_UNKNOWN (never publish with this set)
//   1..99       GI Labs core devices
//   100..127    OSS extension range
enum DeviceClass {
  DEVICE_UNKNOWN       = 0;
  DEVICE_GRIPPER_LEFT  = 1;
  DEVICE_GRIPPER_RIGHT = 2;
  DEVICE_GLOVE_LEFT    = 3;
  DEVICE_GLOVE_RIGHT   = 4;
  DEVICE_QUEST         = 5;
  DEVICE_HOST          = 6;
  DEVICE_EGO           = 7;   // embedded egocentric rig (UMI EQ_EGO parity)
  // 8..99 reserved for future GI Labs devices
  DEVICE_CUSTOM        = 100;
}

// Identifies the payload type that follows this Header on the wire.
// The mapping from StreamKind to protobuf full name is 1:1 and lives
// in docs/stream_type_map.md (human reference) plus a generated
// static table in each language binding (machine reference).
//
// Range conventions:
//   0           STREAM_UNKNOWN (never publish with this set)
//   1..99       GI Labs core stream kinds
//   100..127    OSS extension range
enum StreamKind {
  STREAM_UNKNOWN          = 0;

  // Sensors (1..9)
  STREAM_IMU_RAW          = 1   [
    (visio_proto_type)       = "visio_schema.sensor.v1.ImuRaw",
    (visio_mcap_schema_name) = "visio_schema.sensor.v1.ImuRaw"
  ];
  STREAM_ENCODER_RAW      = 2   [
    (visio_proto_type)       = "visio_schema.sensor.v1.EncoderRaw",
    (visio_mcap_schema_name) = "visio_schema.sensor.v1.EncoderRaw"
  ];
  STREAM_SYSTEM_HEALTH    = 3   [
    (visio_proto_type)       = "visio_schema.sensor.v1.SystemHealth",
    (visio_mcap_schema_name) = "visio_schema.sensor.v1.SystemHealth"
  ];
  STREAM_BUTTON_EVENT     = 4   [
    (visio_proto_type)       = "visio_schema.sensor.v1.ButtonEvent",
    (visio_mcap_schema_name) = "visio_schema.sensor.v1.ButtonEvent"
  ];
  STREAM_IMU_QUAT         = 5   [
    (visio_proto_type)       = "visio_schema.ros.geometry_msgs.v1.Quaternion",
    (visio_mcap_schema_name) = "geometry_msgs/msg/Quaternion"
  ];
  STREAM_IMU_CALIBRATION  = 6   [
    (visio_proto_type)       = "visio_schema.calibration.v1.ImuCalibration",
    (visio_mcap_schema_name) = "visio_schema.calibration.v1.ImuCalibration"
  ];
  // 7..9 reserved for future sensor kinds

  // Vision (10..19)
  STREAM_VIDEO_COMPRESSED = 10  [
    (visio_proto_type)       = "foxglove.CompressedVideo",
    (visio_mcap_schema_name) = "foxglove.CompressedVideo"
  ];
  STREAM_IMAGE_COMPRESSED = 11  [
    (visio_proto_type)       = "foxglove.CompressedImage",
    (visio_mcap_schema_name) = "foxglove.CompressedImage"
  ];
  STREAM_IMAGE_RAW        = 12  [
    (visio_proto_type)       = "foxglove.RawImage",
    (visio_mcap_schema_name) = "foxglove.RawImage"
  ];
  STREAM_CAMERA_CALIB     = 13  [
    (visio_proto_type)       = "foxglove.CameraCalibration",
    (visio_mcap_schema_name) = "foxglove.CameraCalibration"
  ];
  // 14..19 reserved for future vision kinds

  // Audio (20..29)
  STREAM_AUDIO_PCM        = 20  [
    (visio_proto_type)       = "foxglove.RawAudio",
    (visio_mcap_schema_name) = "foxglove.RawAudio"
  ];
  STREAM_AUDIO_COMPRESSED = 21  [
    (visio_proto_type)       = "visio_schema.sensor.v1.AudioCompressed",
    (visio_mcap_schema_name) = "visio_schema.sensor.v1.AudioCompressed"
  ];
  // 22..29 reserved

  // Spatial / state (30..39)
  STREAM_POSE             = 30  [
    (visio_proto_type)       = "foxglove.PoseInFrame",
    (visio_mcap_schema_name) = "foxglove.PoseInFrame"
  ];
  STREAM_TWIST            = 31  [
    (visio_proto_type)       = "visio_schema.geometry.v1.Twist",
    (visio_mcap_schema_name) = "visio_schema.geometry.v1.Twist"
  ];
  STREAM_TF               = 32  [
    (visio_proto_type)       = "foxglove.FrameTransforms",
    (visio_mcap_schema_name) = "foxglove.FrameTransforms"
  ];
  STREAM_JOINT_STATES     = 33  [
    (visio_proto_type)       = "foxglove.JointStates",
    (visio_mcap_schema_name) = "foxglove.JointStates"
  ];
  // 34..39 reserved

  // Input / control (40..49) — virtual user input and host-to-device
  // control directives. (Physical button events live under STREAM_BUTTON_EVENT
  // in the Sensors range, since a button is a sensor reading whose
  // meaning is the receiver's to interpret.)
  STREAM_CONTROLLER_STATE = 40  [
    (visio_proto_type)       = "visio_schema.input.v1.QuestControllerState",
    (visio_mcap_schema_name) = "visio_schema.input.v1.QuestControllerState"
  ];
  STREAM_COMMAND          = 41  [
    (visio_proto_type)       = "visio_schema.control.v1.Command",
    (visio_mcap_schema_name) = "visio_schema.control.v1.Command"
  ];
  // 42..49 reserved

  // Logging (50..59)
  STREAM_LOG              = 50  [
    (visio_proto_type)       = "foxglove.Log",
    (visio_mcap_schema_name) = "foxglove.Log"
  ];
  // 51..59 reserved

  // Session services (60..69). TIMESYNC and DEVICE_INFO carry one of
  // two payload types per direction (Request / Response) — they are
  // deliberately UNannotated so the SchemaRegistry returns None and
  // service implementations hand-code the two-type dispatch.
  STREAM_TIMESYNC         = 60;  // -> visio_schema.service.timesync.v1.{Request,Response}
  STREAM_DEVICE_INFO      = 61;  // -> visio_schema.service.device_info.v1.{Request,Response}
  STREAM_HEARTBEAT        = 62  [
    (visio_proto_type)       = "visio_schema.service.heartbeat.v1.Heartbeat",
    (visio_mcap_schema_name) = "visio_schema.service.heartbeat.v1.Heartbeat"
  ];
  // 63 reserved (was STREAM_SCHEMA_QUERY — schema descriptors now ride
  // inline in STREAM_DEVICE_INFO Response).
  reserved 63;
  reserved "STREAM_SCHEMA_QUERY";

  // 64..99 reserved for future GI Labs stream kinds
  STREAM_CUSTOM           = 100;
}

// The wire Header. Serialized as protobuf and preceded by a 1-byte
// HEADER_LEN field on every framed Endpoint. The payload bytes follow
// immediately after the Header on the wire.
message Header {
  // Origin DeviceClass. Set once at the producing peer; immutable
  // across hops.
  DeviceClass device = 1;

  // Last-hop sender DeviceClass. Equals `device` when not relayed;
  // rewritten by each relay on forward. The receiver uses this to
  // pick the right Timesync offset for the `timestamp` rewrite.
  DeviceClass routed_from = 2;

  // StreamKind — uniquely determines the payload protobuf type via
  // the table in docs/stream_type_map.md.
  StreamKind stream = 3;

  // Sub-stream index. Semantic uint8: range [0, 255]. proto3 has no
  // uint8 type so the underlying field is uint32, but values MUST stay
  // in [0, 255] (impl validates). Examples: finger 0..15 for
  // STREAM_IMU_RAW on a glove, camera 0..1 for STREAM_VIDEO_COMPRESSED
  // on a gripper,
  // 0 for singletons.
  //
  // Wire encoding cost: values 0..127 encode as 1-byte varint;
  // 128..255 as 2-byte varint. Real fleet usage is always in 0..127
  // today (16-17 IMUs per glove being the high water mark), so this
  // field is effectively a 1-byte varint in practice.
  uint32 stream_index = 4;

  // Monotonic sequence counter per (device, stream, stream_index).
  // uint32 matches MCAP's Message.sequence. Wraps at 2^32 — readers
  // detect wraparound by ordinary modular comparison.
  uint32 seq = 5;

  // Local-clock send time. On publish, set to the sender's local
  // clock (mono ns since boot, or Unix ns since epoch if the peer has
  // an RTC). On every receive, the receiving peer's Timesync service
  // REWRITES this field by adding the offset for `routed_from`, so it
  // always reads as "the receiver's own clock equivalent of the
  // sender's send time."
  //
  // Stored as google.protobuf.Timestamp for shape parity with all our
  // payload schemas and with foxglove.*. Costs ~3 extra bytes per
  // message vs a bare uint64 ns; that delta is paid once for whole-
  // schema consistency.
  google.protobuf.Timestamp timestamp = 6;
}
