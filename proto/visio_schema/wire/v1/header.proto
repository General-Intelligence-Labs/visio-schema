syntax = "proto3";

package visio_schema.wire.v1;

import "google/protobuf/timestamp.proto";

// ─────────────────────────────────────────────────────────────────────────
// Wire envelope
// ─────────────────────────────────────────────────────────────────────────
//
// A length-delimited Header precedes every payload on the bus (the serial
// framing wraps this; see transport docs).
//
// Every message is addressed by a single `stream_id` — a compact per-link
// numeric label for a string-named stream (topic). Devices number their own
// output streams at startup and advertise the id↔topic mapping (plus each
// stream's schema) via the DeviceInfo service; hubs remap child ids into a
// unified id space as they relay.
//
// A small block of ids is reserved for control-plane streams whose ids are
// identical on every link and are NEVER remapped, so the discovery handshake
// runs hop-to-hop with zero prior state. Dynamic data-stream ids start at
// FIRST_DYNAMIC.

enum ControlStream {
  CONTROL_STREAM_INVALID = 0;
  CONTROL_STREAM_DEVICE_INFO = 1;
  CONTROL_STREAM_TIMESYNC = 2;
  CONTROL_STREAM_HEARTBEAT = 3;
  CONTROL_STREAM_COMMAND = 4;
  // 5..15 reserved for future control streams.
  // Data-stream ids begin here; this value is the reserved/dynamic boundary,
  // not itself a control stream.
  CONTROL_STREAM_FIRST_DYNAMIC = 16;
}

message Header {
  uint32 stream_id = 1;
  uint32 seq = 2;
  google.protobuf.Timestamp timestamp = 3;
}
