// visio/sensor/v1/imu_raw.proto
//
// Bundled raw IMU samples (gyro / accel / optional mag / optional
// temperature) from a single IMU instance. Published on STREAM_IMU_RAW
// with the wire Header's `stream_index` identifying which IMU.
//
// Why bundled: emitting one wire message per sample at 200 Hz × 16
// IMUs burns header bytes and wastes message slots; bundling N samples
// per message preserves per-sample fidelity (via `t_offset_ns`) while
// amortizing the Header.
//
// Bundle period is a producer-side knob, chosen at config time, not
// part of the schema. Two sensible operating points:
//
//   - 33 ms (~30 Hz emit, ~6-7 samples / bundle at 200 Hz raw):
//     low-latency mode for real-time viewing / control loops.
//
//   - 1 s (~1 Hz emit, ~200 samples / bundle at 200 Hz raw):
//     long-term storage / offline analysis. Lower message overhead,
//     ~1 s buffering RAM per IMU on the producer.
//
// Each ImuRawSample carries its own `t_offset_ns` captured at sensor
// read time (NOT snapped to any grid or emission cadence), so the
// producer's true sample sequence is preserved without resampling.
//
// Why this matters: UMI v3 emitted one combined T_IMU at a 200 Hz
// grid using zero-order-hold per bone, which silently discarded any
// intra-grid samples in the OutputRing. Visio preserves them.
//
// Foxglove does not ship a raw-IMU schema, so this is a gap-filler.
//
// Magnetometer policy: include `magnetic_field` only when the IMU
// produces mag at the SAME cadence as gyro/accel (BNO055-style
// integrated mag). For separate-rate mag chips, leave it unset and
// publish mag on a future visio_schema.sensor.v1.MagneticField stream — do
// NOT resample mag to match gyro/accel at the publisher.

syntax = "proto3";

package visio_schema.sensor.v1;

import "foxglove/Vector3.proto";
import "google/protobuf/timestamp.proto";

// A single raw IMU sample, captured at sensor read time.
message ImuRawSample {
  // Time offset in nanoseconds from ImuRaw.first_sample_time. The
  // producer MUST capture this at the moment of sensor read (e.g.,
  // back-dated from the FIFO drain time using the chip's gyro period)
  // — NOT snapped to any grid or emission cadence.
  uint64 t_offset_ns = 1;

  // Angular velocity in the IMU local frame, rad/s.
  foxglove.Vector3 angular_velocity = 2;

  // Linear acceleration in the IMU local frame, m/s^2 (incl. gravity,
  // matches sensor_msgs/Imu raw semantics).
  foxglove.Vector3 linear_acceleration = 3;

  // Optional magnetic field in the IMU local frame, microtesla (µT).
  // Only set when the IMU produces mag at the same cadence as
  // gyro/accel.
  //
  // Unit note: Visio uses µT to match UMI v3 and the native output
  // range of BNO055 / LSM6DSV / ICM45686 mag channels (no embedded-
  // side scaling needed). This is a deliberate departure from ROS
  // sensor_msgs/MagneticField, which uses Tesla — consumers that
  // interop with ROS-flavored pipelines need to multiply by 1e-6.
  foxglove.Vector3 magnetic_field = 4;

  // Optional die / chip temperature, degrees Celsius. Many IMUs only
  // produce temperature at a much lower rate than the IMU loop; in
  // that case leave it unset on the in-between samples.
  optional double temperature_c = 5;
}

// Bundle of consecutive raw IMU samples from a single IMU instance.
// One bundle is typically emitted per FIFO drain. Empty bundles MUST
// NOT be emitted (use STREAM_HEARTBEAT for liveness).
//
// No frame_id here: each IMU's body frame is implicit per
// (DeviceClass, stream_index) on the wire Header. There is no
// ambiguity to resolve.
message ImuRaw {
  // Time of the first sample in this bundle, in the producer's local
  // clock domain. The wire Header carries the same timestamp.
  google.protobuf.Timestamp first_sample_time = 1;

  // Raw samples in strict acquisition order (t_offset_ns monotonically
  // non-decreasing). Each sample's true acquisition time is preserved.
  repeated ImuRawSample samples = 2;
}
