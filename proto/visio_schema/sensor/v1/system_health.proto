// visio/sensor/v1/system_health.proto
//
// Periodic system telemetry on STREAM_SYSTEM_HEALTH. Cadence ~0.2 Hz
// (one update every 5 s) is typical.
//
// All fields optional — devices emit only what they can measure.
// Parity note: replaces UMI v3's T_SYSTEM. Field semantics match the
// F_CPU_TEMP / F_CPU_USAGE / F_MEM_FREE / F_BATTERY_LEVEL /
// F_DISK_FREE_MB / F_RECORDING / F_STREAM_CLIENTS family. UMI's
// F_GRIPPERS_CONNECTED + F_CAMERAS_STARTED bitmasks become per-device
// concerns reported in DeviceInfo.streams instead.

syntax = "proto3";

package visio_schema.sensor.v1;

import "google/protobuf/timestamp.proto";

message SystemHealth {
  google.protobuf.Timestamp timestamp = 1;

  // CPU die / package temperature in degrees Celsius.
  optional float cpu_temp_c = 2;

  // CPU utilization, percent in [0.0, 100.0]. Across all cores.
  optional float cpu_usage_pct = 3;

  // Free RAM in bytes (NOT kilobytes; v3 used KB).
  optional uint64 mem_free_bytes = 4;

  // Battery state of charge, percent in [0.0, 100.0]. Unset if AC-powered
  // or no battery present.
  optional float battery_pct = 5;

  // Free disk space on the recording volume, in bytes.
  optional uint64 disk_free_bytes = 6;

  // True if the device is currently writing to local recording storage.
  optional bool recording = 7;

  // Count of remote subscribers currently connected to this device's
  // streams.
  optional uint32 stream_clients = 8;
}
