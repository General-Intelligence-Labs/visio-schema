// visio/sensor/v1/audio_compressed.proto
//
// A single compressed audio frame on STREAM_AUDIO_COMPRESSED.
//
// Patterned after foxglove.CompressedVideo (codec-tagged bytes +
// configuration fields). Foxglove ships foxglove.RawAudio for PCM-S16
// only; this message covers the codec range UMI's T_AUDIO already
// uses (AAC-LC ADTS today; Opus / Vorbis straightforward to add).
//
// Configuration fields (sample_rate_hz, channels, bitrate_bps) are
// optional. By convention the producer sets them on the first frame
// of a stream and on any codec/config change; subsequent frames may
// omit them if values are unchanged.

syntax = "proto3";

package visio.sensor.v1;

import "google/protobuf/timestamp.proto";

message AudioCompressed {
  // Codec identifier for the `data` bytes below. Compile-time
  // enumerable, validated at the schema layer rather than as a
  // free-form string.
  enum Codec {
    CODEC_UNKNOWN     = 0;
    CODEC_AAC_LC_ADTS = 1;   // ADTS-framed AAC-LC
    CODEC_OPUS        = 2;   // one Opus packet per AudioCompressed
    CODEC_VORBIS      = 3;   // one Vorbis packet per AudioCompressed
  }

  // Acquisition time of the start of this audio block (producer's
  // local monotonic clock).
  google.protobuf.Timestamp timestamp = 1;

  // Compressed audio frame data. Per-codec framing:
  //
  // - CODEC_AAC_LC_ADTS: one or more ADTS-framed AAC-LC frames
  //   covering exactly one decode unit.
  // - CODEC_OPUS:        one Opus packet.
  // - CODEC_VORBIS:      one Vorbis packet.
  bytes data = 2;

  Codec codec = 3;

  // Sample rate in Hz. Set on first frame and on codec/config change.
  optional uint32 sample_rate_hz = 4;

  // Channel count. Set on first frame and on codec/config change.
  optional uint32 channels = 5;

  // Encoder target bitrate in bits/sec. Informational; not required
  // for decode.
  optional uint32 bitrate_bps = 6;
}
