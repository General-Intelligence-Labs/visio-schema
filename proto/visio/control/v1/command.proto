// visio/control/v1/command.proto
//
// Host-to-device control surface on STREAM_COMMAND. Visio addition;
// UMI v3 did not have a first-class command type (control flow lived
// in config files and out-of-band sockets).
//
// Sender identity is implicit in the wire Header's `device` field.
// Target is explicit so peers can filter quickly.

syntax = "proto3";

package visio.control.v1;

import "visio/wire/v1/header.proto";

message Command {
  // Intended recipient. A receiving peer MUST ignore Commands whose
  // target_device != self. Subscribers should filter at the
  // subscribe level when possible.
  visio.wire.v1.DeviceClass target_device = 1;

  // Per-sender monotonic counter; useful for matching to acks if a
  // future ack mechanism is added.
  uint64 command_id = 2;

  oneof body {
    StartRecording start_recording = 10;
    StopRecording  stop_recording  = 11;
    Identify       identify        = 12;
  }
}

// Begin a recording session on the target.
message StartRecording {
  // Optional session name. If empty, the target picks one.
  string session_name = 1;
}

// End the current recording session on the target.
message StopRecording {
}

// Ask the target to publish its DeviceInfo immediately, out of the
// normal cadence. Replaces UMI v3's T_DEVICE_INFO_REQ query.
message Identify {
}
