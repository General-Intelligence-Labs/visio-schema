[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "visio-schema"
version = "0.2.0.dev0"
description = "Visio wire contract — generated protobuf bindings + the framing codec"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "GI Labs" }]
# The hand-written codec needs these at runtime; the generated bindings
# only need protobuf. One package, one dependency set.
dependencies = [
    "protobuf>=5.26",
    "cobs>=1.2",
]

[project.optional-dependencies]
# MCAP recording/replay (visio_schema.mcap) — the base stays protobuf+cobs.
recording = [
    "mcap>=1.1",
]
dev = [
    "pytest>=8.0",
    "mypy>=1.10",
    "ruff>=0.5",
    "mcap>=1.1",
]

# The wheel ships ONE `visio_schema` import root combining the hand-written
# codec modules and the generated bindings, both under python/visio_schema
# (`make gen` emits the bindings in-package). The generated foxglove.*
# bindings are relocated under visio_schema.foxglove so they don't collide
# with the official `foxglove` SDK package.
[tool.setuptools.packages.find]
where = ["."]
include = ["visio_schema*"]
namespaces = true

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: cross-boundary tests (serial/pty, cross-language)",
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "RUF"]
